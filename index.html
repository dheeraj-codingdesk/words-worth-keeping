<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Daily Quote</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=IM+Fell+English:ital@0;1&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --ink: #1a1208;
    --parchment: #f5efe0;
    --aged: #e8dcc8;
    --rust: #b5440e;
    --fade: #9a8f7a;
    --gold: #c9962a;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--aged);
    background-image: repeating-linear-gradient(
      0deg, transparent, transparent 28px,
      rgba(26,18,8,0.04) 28px, rgba(26,18,8,0.04) 29px
    );
    color: var(--ink);
    font-family: 'Libre Baskerville', Georgia, serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* MASTHEAD */
  .masthead {
    width: 100%;
    max-width: 900px;
    padding: 28px 24px 0;
    animation: fadeDown 0.7s ease forwards;
  }
  .masthead-rule { height: 3px; background: var(--ink); margin-bottom: 4px; }
  .masthead-rule-thin { height: 1px; background: var(--ink); margin-bottom: 16px; }
  .masthead-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 6px;
  }
  .edition-label {
    font-size: 0.65rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--fade);
    min-width: 120px;
  }
  .masthead-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.6rem, 7vw, 5rem);
    font-weight: 900;
    letter-spacing: -0.02em;
    line-height: 1;
    text-align: center;
    flex: 1;
    text-shadow: 2px 2px 0 rgba(26,18,8,0.08);
  }
  .date-line {
    font-family: 'IM Fell English', serif;
    font-size: 0.75rem;
    color: var(--fade);
    text-align: right;
    min-width: 120px;
  }
  .masthead-tagline {
    text-align: center;
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 0.8rem;
    color: var(--fade);
    letter-spacing: 0.08em;
    margin-bottom: 12px;
  }

  /* PAPER */
  .paper {
    width: 100%;
    max-width: 900px;
    padding: 0 24px 60px;
    display: flex;
    flex-direction: column;
  }

  /* QUOTE STAGE */
  .quote-stage {
    background: var(--parchment);
    border: 1px solid rgba(26,18,8,0.2);
    padding: 44px 52px 40px;
    position: relative;
    box-shadow: 4px 4px 0 rgba(26,18,8,0.12), 8px 8px 0 rgba(26,18,8,0.06);
    min-height: 260px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    animation: fadeUp 0.8s 0.3s ease both;
  }
  .quote-stage::before {
    content: '';
    position: absolute;
    inset: 8px;
    border: 1px solid rgba(26,18,8,0.08);
    pointer-events: none;
  }
  .quote-mark {
    font-family: 'Playfair Display', serif;
    font-size: 7rem;
    line-height: 0;
    color: var(--rust);
    opacity: 0.18;
    position: absolute;
    top: 52px;
    left: 42px;
    user-select: none;
  }
  .ornament {
    text-align: center;
    font-size: 1.1rem;
    color: var(--rust);
    margin-bottom: 20px;
    opacity: 0.6;
    letter-spacing: 0.3em;
  }
  .quote-text {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.2rem, 3vw, 1.65rem);
    font-style: italic;
    line-height: 1.65;
    color: var(--ink);
    text-align: center;
    position: relative;
    z-index: 1;
    padding: 0 16px;
  }
  .quote-author {
    font-family: 'Libre Baskerville', serif;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--rust);
    text-align: center;
    margin-top: 24px;
    position: relative;
    z-index: 1;
  }
  .quote-author::before, .quote-author::after { content: ' — '; opacity: 0.5; }
  .loading-state {
    text-align: center;
    font-family: 'IM Fell English', serif;
    font-style: italic;
    color: var(--fade);
    font-size: 1.1rem;
    padding: 20px 0;
  }
  .loading-dot { display: inline-block; animation: blink 1.2s infinite; }
  .loading-dot:nth-child(2) { animation-delay: 0.2s; }
  .loading-dot:nth-child(3) { animation-delay: 0.4s; }

  /* ACTION ROW */
  .action-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 0 0;
    border-top: 1px solid rgba(26,18,8,0.15);
    animation: fadeUp 0.8s 0.5s ease both;
  }
  .like-count-badge {
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--fade);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .like-count-badge strong {
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--rust);
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .btn-group { display: flex; gap: 12px; }
  button {
    font-family: 'Libre Baskerville', serif;
    cursor: pointer;
    border: none;
    transition: all 0.15s ease;
  }
  .btn-new {
    background: var(--ink);
    color: var(--parchment);
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 10px 22px;
    box-shadow: 3px 3px 0 var(--rust);
  }
  .btn-new:hover:not(:disabled) { transform: translate(-2px,-2px); box-shadow: 5px 5px 0 var(--rust); }
  .btn-new:active:not(:disabled) { transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--rust); }
  .btn-new:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; }

  .btn-like {
    background: transparent;
    border: 1.5px solid var(--rust);
    color: var(--rust);
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 10px 18px;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .btn-like.liked { background: var(--rust); color: var(--parchment); }
  .btn-like:hover:not(:disabled) { background: var(--rust); color: var(--parchment); }
  .btn-like:disabled { opacity: 0.4; cursor: not-allowed; }
  .heart-icon { display: inline-block; transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1); }
  .btn-like.liked .heart-icon { transform: scale(1.3); }
  .btn-like:hover .heart-icon { transform: scale(1.3); }

  /* SECTION DIVIDER */
  .section-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 28px 0 20px;
    animation: fadeUp 0.8s 0.7s ease both;
  }
  .section-divider .line { flex: 1; height: 1px; background: rgba(26,18,8,0.2); }
  .section-divider .label {
    font-size: 0.65rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--fade);
    white-space: nowrap;
  }

  /* SEARCH */
  .search-bar {
    animation: fadeUp 0.8s 0.75s ease both;
    margin-bottom: 20px;
    position: relative;
  }
  .search-bar input {
    width: 100%;
    background: var(--parchment);
    border: 1px solid rgba(26,18,8,0.2);
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 0.9rem;
    color: var(--ink);
    padding: 10px 36px 10px 14px;
    outline: none;
    box-shadow: 2px 2px 0 rgba(26,18,8,0.06);
    transition: box-shadow 0.15s ease;
  }
  .search-bar input::placeholder { color: var(--fade); }
  .search-bar input:focus { box-shadow: 3px 3px 0 var(--rust); border-color: var(--rust); }
  .search-clear {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--fade);
    font-size: 1rem;
    cursor: pointer;
    padding: 2px 4px;
    line-height: 1;
  }
  .search-clear:hover { color: var(--rust); }

  /* COLLECTION */
  .liked-section { animation: fadeUp 0.8s 0.8s ease both; }
  .liked-empty {
    text-align: center;
    font-family: 'IM Fell English', serif;
    font-style: italic;
    color: var(--fade);
    font-size: 0.9rem;
    padding: 24px;
    border: 1px dashed rgba(26,18,8,0.2);
  }
  .liked-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }
  .liked-card {
    background: var(--parchment);
    border: 1px solid rgba(26,18,8,0.15);
    padding: 20px 22px 14px;
    position: relative;
    box-shadow: 2px 2px 0 rgba(26,18,8,0.08);
    animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
    overflow: hidden;
  }
  .liked-card::after {
    content: '♥';
    position: absolute;
    top: 10px;
    right: 12px;
    font-size: 0.6rem;
    color: var(--rust);
    opacity: 0.45;
  }
  .liked-card-quote {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 0.88rem;
    line-height: 1.6;
    color: var(--ink);
    margin-bottom: 10px;
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .liked-card-author {
    font-size: 0.62rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--rust);
  }
  .liked-card-author::before { content: '— '; }
  .liked-card-remove {
    position: absolute;
    bottom: 8px;
    right: 10px;
    background: none;
    border: none;
    font-size: 0.6rem;
    color: var(--fade);
    cursor: pointer;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 2px 4px;
    opacity: 0;
    transition: opacity 0.15s ease, color 0.15s ease;
  }
  .liked-card:hover .liked-card-remove { opacity: 1; }
  .liked-card-remove:hover { color: var(--rust); }

  /* FOOTER */
  .footer {
    text-align: center;
    padding: 16px;
    font-family: 'IM Fell English', serif;
    font-size: 0.7rem;
    color: var(--fade);
    animation: fadeUp 0.8s 1s ease both;
    letter-spacing: 0.06em;
  }

  /* ANIMATIONS */
  @keyframes fadeDown { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeUp   { from { opacity:0; transform:translateY(16px);  } to { opacity:1; transform:translateY(0); } }
  @keyframes blink    { 0%,100% { opacity:0.2; } 50% { opacity:1; } }
  @keyframes popIn    { from { opacity:0; transform:scale(0.92) translateY(8px); } to { opacity:1; transform:scale(1) translateY(0); } }
  @keyframes heartPop { 0%{transform:scale(1)} 30%{transform:scale(1.5)} 60%{transform:scale(0.85)} 100%{transform:scale(1)} }
  .heart-pop { animation: heartPop 0.4s ease; }

  @media (max-width: 600px) {
    .quote-stage { padding: 32px 28px 28px; }
    .masthead-title { font-size: 2.4rem; }
    .action-row { flex-direction: column-reverse; gap: 16px; align-items: stretch; }
    .btn-group { justify-content: stretch; }
    .btn-group button { flex: 1; justify-content: center; }
    .like-count-badge { justify-content: center; }
    .liked-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const STORAGE_KEY = 'daily-quote-liked-v2';
const FALLBACKS = [
  { id:'f1', content:'The only way to do great work is to love what you do.', author:'Steve Jobs' },
  { id:'f2', content:'In the middle of every difficulty lies opportunity.', author:'Albert Einstein' },
  { id:'f3', content:'It does not matter how slowly you go as long as you do not stop.', author:'Confucius' },
  { id:'f4', content:"Life is what happens when you're busy making other plans.", author:'John Lennon' },
  { id:'f5', content:'The future belongs to those who believe in the beauty of their dreams.', author:'Eleanor Roosevelt' },
  { id:'f6', content:'Strive not to be a success, but rather to be of value.', author:'Albert Einstein' },
  { id:'f7', content:'The mind is everything. What you think you become.', author:'Buddha' },
];

function loadLiked() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}

// ── LikedCard ──────────────────────────────────────────────────────────────
function LikedCard({ quote, onRemove, index }) {
  return (
    <div className="liked-card" style={{ animationDelay: `${index * 0.05}s` }}>
      <p className="liked-card-quote">{quote.content}</p>
      <p className="liked-card-author">{quote.author}</p>
      <button className="liked-card-remove" onClick={() => onRemove(quote.id)}>
        remove
      </button>
    </div>
  );
}

// ── QuoteStage ─────────────────────────────────────────────────────────────
function QuoteStage({ quote, loading, isLiked, onLike, onNew }) {
  const heartRef = useRef(null);

  function handleLike() {
    if (heartRef.current) {
      heartRef.current.classList.remove('heart-pop');
      void heartRef.current.offsetWidth;
      heartRef.current.classList.add('heart-pop');
      setTimeout(() => heartRef.current?.classList.remove('heart-pop'), 400);
    }
    onLike();
  }

  return (
    <>
      <div className="quote-stage">
        <span className="quote-mark">"</span>
        <div className="ornament">✦ &nbsp; ✦ &nbsp; ✦</div>

        {loading ? (
          <p className="loading-state">
            Consulting the archives
            <span className="loading-dot">.</span>
            <span className="loading-dot">.</span>
            <span className="loading-dot">.</span>
          </p>
        ) : quote ? (
          <>
            <p className="quote-text">{quote.content}</p>
            <p className="quote-author">{quote.author}</p>
          </>
        ) : null}
      </div>

      <div className="action-row">
        <div className="like-count-badge">
          <strong>{isLiked !== undefined ? '' : ''}</strong>
        </div>
        <div className="btn-group">
          <button
            className={`btn-like${isLiked ? ' liked' : ''}`}
            disabled={loading || !quote}
            onClick={handleLike}
          >
            <span className="heart-icon" ref={heartRef}>
              {isLiked ? '♥' : '♡'}
            </span>
            {isLiked ? 'Liked' : 'Like'}
          </button>
          <button className="btn-new" disabled={loading} onClick={onNew}>
            New Quote
          </button>
        </div>
      </div>
    </>
  );
}

// ── App ────────────────────────────────────────────────────────────────────
function App() {
  // useState for all UI + data state
  const [quote, setQuote]           = useState(null);
  const [loading, setLoading]       = useState(false);
  const [likedQuotes, setLikedQuotes] = useState(loadLiked);
  const [searchQuery, setSearchQuery] = useState('');
  const [showOnlyLiked, setShowOnlyLiked] = useState(false);

  const today = new Date().toLocaleDateString('en-US', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });

  // useEffect to fetch quote on mount
  useEffect(() => {
    fetchQuote();
  }, []);

  // useEffect to persist liked quotes to localStorage
  useEffect(() => {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(likedQuotes));
  }, [likedQuotes]);

  async function fetchQuote() {
    setLoading(true);
    setQuote(null);
    let fetched = null;

    try {
      const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent('https://api.quotable.io/random')}`;
      const res = await fetch(proxyUrl, { signal: AbortSignal.timeout(7000) });
      if (res.ok) {
        const data = await res.json();
        const parsed = data.contents ? JSON.parse(data.contents) : data;
        if (parsed?.content) {
          fetched = { id: parsed._id || String(Date.now()), content: parsed.content, author: parsed.author };
        }
      }
    } catch { /* fall through to fallback */ }

    if (!fetched) {
      fetched = FALLBACKS[Math.floor(Math.random() * FALLBACKS.length)];
    }

    setQuote(fetched);
    setLoading(false);
  }

  function toggleLike() {
    if (!quote) return;
    const alreadyLiked = likedQuotes.some(q => q.id === quote.id);
    if (alreadyLiked) {
      setLikedQuotes(prev => prev.filter(q => q.id !== quote.id));
    } else {
      setLikedQuotes(prev => [quote, ...prev]);
    }
  }

  function removeLiked(id) {
    setLikedQuotes(prev => prev.filter(q => q.id !== id));
  }

  const isCurrentLiked = quote ? likedQuotes.some(q => q.id === quote.id) : false;

  // Filter: search by author or quote text, plus optional "only liked" toggle
  const filteredQuotes = likedQuotes.filter(q => {
    const term = searchQuery.toLowerCase();
    const matchesSearch = !term ||
      q.content.toLowerCase().includes(term) ||
      q.author.toLowerCase().includes(term);
    return matchesSearch;
  });

  const collectionEmpty = likedQuotes.length === 0;
  const searchEmpty = !collectionEmpty && filteredQuotes.length === 0;

  return (
    <>
      <header className="masthead">
        <div className="masthead-top">
          <span className="edition-label">Vol. I — Est. Today</span>
          <h1 className="masthead-title">The Daily Quote</h1>
          <div className="date-line">{today}</div>
        </div>
        <p className="masthead-tagline">Words worth carrying through the day</p>
        <div className="masthead-rule"></div>
        <div className="masthead-rule-thin"></div>
      </header>

      <main className="paper">
        <QuoteStage
          quote={quote}
          loading={loading}
          isLiked={isCurrentLiked}
          onLike={toggleLike}
          onNew={fetchQuote}
        />

        {/* Like count */}
        <div className="action-row" style={{ paddingTop: 0, borderTop: 'none', paddingBottom: 0 }}>
          <div className="like-count-badge">
            <strong>{likedQuotes.length}</strong>
            {likedQuotes.length === 1 ? 'quote' : 'quotes'} saved to your collection
          </div>
        </div>

        {/* Collection section */}
        <div className="section-divider">
          <div className="line"></div>
          <span className="label">Your Collection</span>
          <div className="line"></div>
        </div>

        <section className="liked-section">
          {/* Search bar — filter through liked quotes */}
          {likedQuotes.length > 0 && (
            <div className="search-bar">
              <input
                type="text"
                placeholder="Search your collection by quote or author…"
                value={searchQuery}
                onChange={e => setSearchQuery(e.target.value)}
              />
              {searchQuery && (
                <button className="search-clear" onClick={() => setSearchQuery('')}>✕</button>
              )}
            </div>
          )}

          {/* Empty states */}
          {collectionEmpty && (
            <p className="liked-empty">
              Nothing collected yet — like a quote to save it here.
            </p>
          )}
          {searchEmpty && (
            <p className="liked-empty">
              No quotes match "{searchQuery}".
            </p>
          )}

          {/* map() over filtered liked quotes with proper keys */}
          <div className="liked-grid">
            {filteredQuotes.map((q, i) => (
              <LikedCard
                key={q.id}
                quote={q}
                index={i}
                onRemove={removeLiked}
              />
            ))}
          </div>
        </section>
      </main>

      <footer className="footer">
        ✦ &nbsp; All quotes lovingly fetched from quotable.io &nbsp; ✦
      </footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
